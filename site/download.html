<div class="header">

<script>
// ===== Config =====
// ===== 后端 API 地址 =====
// 部署后端后，将此处替换为实际地址
// Railway 示例: 'https://your-app.up.railway.app'
// 本地测试:    'http://localhost:8000'
const API_BASE = 'http://localhost:8000';

let currentVideoUrl = '';
let selectedFormatId = '';

// ===== Helper: format duration =====
function fmtDuration(sec) {
  if (!sec) return '--:--';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return m + ':' + String(s).padStart(2,'0');
}

// ===== Helper: format filesize =====
function fmtSize(bytes) {
  if (!bytes || bytes <= 0) return '未知大小';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  return (bytes/1024/1024/1024).toFixed(2) + ' GB';
}

// ===== Show/hide helpers =====
function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('active');
}
function hideError() {
  document.getElementById('errorBox').classList.remove('active');
}

// ===== Fetch video info =====
async function fetchInfo() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) {
    showError('请粘贴视频链接');
    return;
  }
  hideError();
  document.getElementById('infoCard').classList.remove('active');
  document.getElementById('loadingWrap').classList.add('active');
  document.getElementById('fetchBtn').disabled = true;

  try {
    const res = await fetch(API_BASE + '/api/info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    if (!data.success) {
      showError(data.error || '获取视频信息失败');
      return;
    }

    currentVideoUrl = url;
    renderInfo(data);
  } catch (e) {
    showError('网络请求失败：' + e.message);
  } finally {
    document.getElementById('loadingWrap').classList.remove('active');
    document.getElementById('fetchBtn').disabled = false;
  }
}

// ===== Render video info and formats =====
function renderInfo(data) {
  const v = data.video;
  document.getElementById('thumbImg').src = v.thumbnail || '';
  document.getElementById('videoTitle').textContent = v.title || '未知标题';
  document.getElementById('channelName').textContent = v.channel || '';
  document.getElementById('durationSpan').textContent = fmtDuration(v.duration);

  const grid = document.getElementById('formatGrid');
  grid.innerHTML = '';

  let formats = v.formats || [];

  // Priority format labels
  const labelMap = {
    '2160': '4K',
    '1440': '2K',
    '1080': '1080p',
    '720': '720p',
    '480': '480p',
    '360': '360p',
    '240': '240p',
    '144': '144p',
  };

  // Group & deduplicate by resolution height
  const seen = new Set();
  const bestFormats = [];

  // Sort by quality descending
  formats.sort((a, b) => (b.height || 0) - (a.height || 0));

  for (const f of formats) {
    // Skip audio-only entries for video format grid
    if (!f.vcodec || f.vcodec === 'none') continue;
    const h = f.height || 0;
    if (h < 144) continue;
    const key = String(h) + (f.filesize || 0);
    if (seen.has(key)) continue;
    seen.add(key);
    bestFormats.push(f);
  }

  // Add audio-only option
  const audioFormat = formats.find(f => (!f.vcodec || f.vcodec === 'none') && f.acodec && f.acodec !== 'none');
  if (audioFormat) {
    bestFormats.push({ audioOnly: true, format_id: audioFormat.format_id, ext: audioFormat.ext, filesize: audioFormat.filesize, tbr: audioFormat.tbr });
  }

  if (bestFormats.length === 0) {
    // fallback: use format_id from data
    grid.innerHTML = '<div style="grid-column:1/-1;color:#8e8ea0;font-size:14px;text-align:center;padding:12px;">暂无详细格式信息，将使用默认最高画质</div>';
    selectedFormatId = 'bestvideo+bestaudio/best';
    return;
  }

  let selected = false;
  for (const f of bestFormats) {
    const card = document.createElement('div');
    card.className = 'format-card';

    if (f.audioOnly) {
      card.innerHTML = `
        <div class="qual">🎵 音频</div>
        <div class="sub">${(f.tbr||128).toFixed(0)}kbps · ${f.ext||'m4a'}</div>
        <div class="filesize">${fmtSize(f.filesize)}</div>
      `;
      card.dataset.fid = f.format_id || 'bestaudio/best';
    } else {
      const label = labelMap[String(f.height)] || (f.height ? f.height + 'p' : '未知');
      const fps = f.fps && f.fps > 30 ? ' ' + f.fps + 'fps' : '';
      card.innerHTML = `
        <div class="qual">${label}${fps}</div>
        <div class="sub">${f.ext || ''} · ${f.vcodec ? f.vcodec.split('.')[0].replace('avc1','H.264').replace('vp9','VP9').replace('av01','AV1') : ''}</div>
        <div class="filesize">${fmtSize(f.filesize)}</div>
      `;
      let fid = f.format_id;
      // For DASH video-only formats, merge with best audio
      if (f.acodec === 'none' || !f.acodec) {
        fid = f.format_id + '+bestaudio/best';
      }
      card.dataset.fid = fid;
    }

    card.onclick = () => {
      document.querySelectorAll('.format-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedFormatId = card.dataset.fid;
      document.getElementById('downloadBtn').disabled = false;
    };

    // Select best quality by default
    if (!selected) {
      card.classList.add('selected');
      selectedFormatId = card.dataset.fid;
      selected = true;
    }

    grid.appendChild(card);
  }

  document.getElementById('infoCard').classList.add('active');
  document.getElementById('downloadBtn').disabled = !selectedFormatId;
}

// ===== Start download =====
function startDownload() {
  if (!currentVideoUrl || !selectedFormatId) return;

  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const progressPct = document.getElementById('progressPct');

  progressWrap.classList.add('active');
  progressFill.style.width = '0%';
  progressLabel.textContent = '正在准备下载...';
  progressPct.textContent = '0%';
  document.getElementById('downloadBtn').disabled = true;

  const params = new URLSearchParams({ url: currentVideoUrl, format: selectedFormatId });
  const dlUrl = API_BASE + '/api/download?' + params.toString();

  // Use fetch to stream the response
  fetch(dlUrl)
    .then(async (res) => {
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: '下载失败' }));
        throw new Error(err.error || '下载失败');
      }

      const contentDisposition = res.headers.get('Content-Disposition') || '';
      const filename = contentDisposition.match(/filename\*?=(?:UTF-8'')?([^;\s]+)/i)?.[1]
        || contentDisposition.match(/filename="?([^"]+)"?/i)?.[1]
        || 'video.mp4';

      const contentType = res.headers.get('Content-Type') || 'video/mp4';
      const total = parseInt(res.headers.get('Content-Length') || '0', 10);
      let loaded = 0;
      const reader = res.body.getReader();
      const chunks = [];

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total) {
          const pct = Math.round((loaded / total) * 100);
          progressFill.style.width = pct + '%';
          progressPct.textContent = pct + '%';
          progressLabel.textContent = '正在下载... ' + (loaded / 1024 / 1024).toFixed(1) + ' MB';
        } else {
          progressLabel.textContent = '正在下载... ' + (loaded / 1024 / 1024).toFixed(1) + ' MB';
          // Indeterminate animation
          progressFill.style.width = Math.min(95, (loaded / (5 * 1024 * 1024)) * 100) + '%';
        }
      }

      progressLabel.textContent = '下载完成，正在保存...';

      const blob = new Blob(chunks, { type: contentType });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = decodeURIComponent(filename.replace(/\+/g, ' ')) || 'video.' + (contentType.includes('mp4') ? 'mp4' : 'mp4');
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);

      progressFill.style.width = '100%';
      progressPct.textContent = '100%';
      progressLabel.textContent = '✅ 下载完成';
      document.getElementById('downloadBtn').disabled = false;
    })
    .catch(err => {
      showError('下载失败：' + err.message);
      progressWrap.classList.remove('active');
      document.getElementById('downloadBtn').disabled = false;
    });
}

// ===== Enter key support =====
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchInfo();
});
</script>
